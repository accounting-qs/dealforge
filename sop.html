<script>
// Normalize any Loom link (share/embed/custom) to an embeddable URL.
function loomEmbedUrl(raw) {
  if (!raw) return '';
  var url = String(raw).trim();
  // Pull the video id: 32-hex after /share/ or /embed/, else last path segment.
  var m = url.match(/loom\.com\/(?:share|embed)\/([0-9a-zA-Z]+)/);
  var id = m ? m[1] : null;
  if (!id) {
    var tail = url.split('?')[0].split('/').filter(Boolean).pop();
    if (tail && /^[0-9a-zA-Z]+$/.test(tail)) id = tail;
  }
  return id ? 'https://www.loom.com/embed/' + id : '';
}

(async function () {
  try {
    var r = await fetch('/api/admin/sop-config');
    var c = await r.json();
    var embed = loomEmbedUrl(c.loom_url);
    if (embed) {
      var wrap = document.getElementById('video-wrap');
      wrap.innerHTML = '<iframe src="' + embed + '" frameborder="0" allowfullscreen ' +
        'allow="autoplay; fullscreen; picture-in-picture"></iframe>';
    }
  } catch (e) {
    document.getElementById('placeholder').lastElementChild.textContent =
      'Could not load the walkthrough video.';
  }
})();
</script>
