<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prospect Intelligence File — Deal Forge</title>
  <meta name="description" content="Aggregated intelligence file for a Deal Forge prospect — calls, jobs, ICP, and analysis in one place.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #09090b;
      --surface:  #18181b;
      --border:   rgba(255,255,255,0.07);
      --text:     #e4e4e7;
      --muted:    #71717a;
      --dim:      #52525b;
      --accent:   #7c3aed;
      --green:    #4ade80;
      --yellow:   #fbbf24;
      --red:      #f87171;
      --blue:     #60a5fa;
    }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; font-size:14px; min-height:100vh; }

    /* ── NAV ──────────────────────────────────────────────── */
    .nav {
      position:sticky; top:0; z-index:100;
      display:flex; align-items:center; gap:12px;
      padding:0 24px; height:52px;
      background:rgba(9,9,11,0.92); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
    }
    .nav-logo { font-size:15px; font-weight:800; letter-spacing:-0.02em; color:#fff; text-decoration:none; }
    .nav-logo span { color:var(--accent); }
    .nav-sep { flex:1; }
    .nav-back { font-size:12px; color:var(--muted); text-decoration:none; display:flex; align-items:center; gap:5px; padding:5px 10px; border-radius:6px; border:1px solid var(--border); transition:border-color 120ms; }
    .nav-back:hover { border-color:rgba(255,255,255,0.15); color:var(--text); }
    .bell-btn { position:relative; background:none; border:1px solid var(--border); border-radius:8px; padding:6px 10px; cursor:pointer; color:var(--muted); display:flex; align-items:center; gap:6px; font-size:13px; font-family:inherit; transition:border-color 120ms; }
    .bell-btn:hover { border-color:rgba(255,255,255,0.18); color:var(--text); }
    .bell-badge { position:absolute; top:-5px; right:-5px; min-width:17px; height:17px; background:var(--accent); color:#fff; font-size:10px; font-weight:700; border-radius:9px; display:flex; align-items:center; justify-content:center; padding:0 4px; }

    /* ── PAGE LAYOUT ──────────────────────────────────────── */
    .page { max-width:960px; margin:0 auto; padding:32px 24px 60px; }

    /* ── HEADER ───────────────────────────────────────────── */
    .prospect-header {
      padding:28px; border-radius:14px;
      background:linear-gradient(135deg,rgba(124,58,237,0.12),rgba(124,58,237,0.04));
      border:1px solid rgba(124,58,237,0.2);
      margin-bottom:28px;
    }
    .prospect-label { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent); margin-bottom:10px; }
    .prospect-name { font-size:26px; font-weight:800; letter-spacing:-0.02em; color:#fff; }
    .prospect-email { font-size:13px; color:var(--muted); margin-top:4px; }
    .prospect-meta { display:flex; gap:20px; margin-top:16px; flex-wrap:wrap; }
    .prospect-meta-item { font-size:12px; color:var(--muted); }
    .prospect-meta-item strong { color:var(--text); }

    /* ── TABS ─────────────────────────────────────────────── */
    .tabs { display:flex; gap:4px; margin-bottom:24px; }
    .tab { background:none; border:1px solid var(--border); border-radius:8px; padding:7px 16px; font-size:13px; font-family:inherit; color:var(--muted); cursor:pointer; transition:all 120ms; font-weight:500; }
    .tab:hover { border-color:rgba(255,255,255,0.15); color:var(--text); }
    .tab.active { background:rgba(124,58,237,0.15); border-color:rgba(124,58,237,0.4); color:#c4b5fd; }
    .tab-pane { display:none; }
    .tab-pane.active { display:block; }

    /* ── CARDS ────────────────────────────────────────────── */
    .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:14px; transition:border-color 120ms; }
    .card:hover { border-color:rgba(255,255,255,0.12); }
    .card-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:12px; }
    .card-title { font-size:14px; font-weight:600; color:var(--text); }
    .card-sub { font-size:12px; color:var(--muted); margin-top:3px; }
    .card-body { font-size:13px; color:var(--muted); line-height:1.65; }

    /* ── PILLS ────────────────────────────────────────────── */
    .pill { display:inline-flex; align-items:center; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; border:1px solid; }
    .pill-green  { color:var(--green); border-color:rgba(74,222,128,0.3); background:rgba(74,222,128,0.07); }
    .pill-yellow { color:var(--yellow); border-color:rgba(251,191,36,0.3); background:rgba(251,191,36,0.07); }
    .pill-red    { color:var(--red); border-color:rgba(248,113,113,0.3); background:rgba(248,113,113,0.07); }
    .pill-blue   { color:var(--blue); border-color:rgba(96,165,250,0.3); background:rgba(96,165,250,0.07); }
    .pill-purple { color:#c4b5fd; border-color:rgba(196,181,253,0.3); background:rgba(124,58,237,0.1); }

    /* ── Q SCORE RING ─────────────────────────────────────── */
    .q-ring { display:flex; align-items:center; justify-content:center; width:46px; height:46px; border-radius:50%; border:3px solid; font-size:14px; font-weight:800; flex-shrink:0; }

    /* ── ICP TABLE ────────────────────────────────────────── */
    .icp-grid { display:grid; grid-template-columns:140px 1fr; gap:10px 20px; align-items:start; }
    .icp-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.07em; color:var(--dim); padding-top:1px; }
    .icp-value { font-size:13px; color:var(--text); }

    /* ── EMPTY STATE ──────────────────────────────────────── */
    .empty { text-align:center; padding:48px 24px; color:var(--muted); font-size:13px; }

    /* ── ACTION LINKS ─────────────────────────────────────── */
    .action-link { font-size:12px; color:var(--accent); text-decoration:none; display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border:1px solid rgba(124,58,237,0.3); border-radius:6px; transition:all 120ms; }
    .action-link:hover { background:rgba(124,58,237,0.1); border-color:rgba(124,58,237,0.5); }

    /* ── SECTION LABEL ────────────────────────────────────── */
    .section-label { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--dim); margin-bottom:12px; }

    /* ── STATUS DOTS ──────────────────────────────────────── */
    .dot { display:inline-block; width:7px; height:7px; border-radius:50%; flex-shrink:0; }

    /* ── NOTIFICATION OVERLAY ─────────────────────────────── */
    .notif-overlay { display:none; position:fixed; inset:0; z-index:200; }
    .notif-overlay.open { display:block; }
    .notif-backdrop { position:absolute; inset:0; }
    .notif-panel {
      position:absolute; top:54px; right:24px;
      width:360px; max-height:480px; overflow-y:auto;
      background:#1c1c1f; border:1px solid var(--border); border-radius:14px;
      box-shadow:0 20px 60px rgba(0,0,0,0.5);
    }
    .notif-panel::-webkit-scrollbar { width:4px; }
    .notif-panel::-webkit-scrollbar-track { background:transparent; }
    .notif-panel::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:4px; }
    .notif-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px 10px; border-bottom:1px solid var(--border); }
    .notif-header-title { font-size:13px; font-weight:700; color:var(--text); }
    .notif-mark-btn { font-size:11px; color:var(--accent); background:none; border:none; cursor:pointer; font-family:inherit; }
    .notif-item { padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 100ms; }
    .notif-item:hover { background:rgba(255,255,255,0.03); }
    .notif-item.unread { background:rgba(124,58,237,0.05); }
    .notif-item-title { font-size:13px; font-weight:500; color:var(--text); margin-bottom:3px; }
    .notif-item-body { font-size:12px; color:var(--muted); }
    .notif-item-time { font-size:11px; color:var(--dim); margin-top:4px; }
    .notif-icon { font-size:16px; margin-right:8px; }
    .notif-empty { padding:32px 16px; text-align:center; color:var(--muted); font-size:13px; }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="/dashboard" class="nav-logo">Deal<span>Forge</span></a>
  <div class="nav-sep"></div>
  <a href="/calls" class="nav-back">← Call Library</a>
  <button class="bell-btn" onclick="toggleNotifPanel()" id="bell-btn">
    🔔 <span id="bell-count" style="display:none">0</span>
    <span class="bell-badge" id="bell-badge" style="display:none">0</span>
  </button>
</nav>

<!-- NOTIFICATION PANEL -->
<div class="notif-overlay" id="notif-overlay">
  <div class="notif-backdrop" onclick="toggleNotifPanel()"></div>
  <div class="notif-panel">
    <div class="notif-header">
      <span class="notif-header-title">🔔 Notifications</span>
      <button class="notif-mark-btn" onclick="markAllRead()">Mark all read</button>
    </div>
    <div id="notif-list"><div class="notif-empty">Loading…</div></div>
  </div>
</div>

<!-- PAGE -->
<div class="page">
  <div class="prospect-header" id="prospect-header">
    <div class="prospect-label">Prospect Intelligence File</div>
    <div class="prospect-name" id="p-name">Loading…</div>
    <div class="prospect-email" id="p-email"></div>
    <div class="prospect-meta" id="p-meta"></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('calls', this)" id="tab-calls">📞 Calls (<span id="tab-calls-count">0</span>)</button>
    <button class="tab" onclick="switchTab('jobs', this)" id="tab-jobs">📊 Jobs (<span id="tab-jobs-count">0</span>)</button>
    <button class="tab" onclick="switchTab('icp', this)" id="tab-icp">🎯 ICP</button>
  </div>

  <!-- CALLS TAB -->
  <div class="tab-pane active" id="pane-calls">
    <div class="section-label">Call History</div>
    <div id="calls-list"><div class="empty">Loading calls…</div></div>
  </div>

  <!-- JOBS TAB -->
  <div class="tab-pane" id="pane-jobs">
    <div class="section-label">Deal Forge Jobs</div>
    <div id="jobs-list"><div class="empty">Loading jobs…</div></div>
  </div>

  <!-- ICP TAB -->
  <div class="tab-pane" id="pane-icp">
    <div class="section-label">Ideal Customer Profile</div>
    <div class="card" id="icp-card">
      <div class="empty">No ICP data yet. Create a job from an approved call to generate one.</div>
    </div>
  </div>
</div>

<script>
var PROSPECT_DATA = null;

// ── Helpers ─────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function relTime(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr), now = new Date();
  var diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}
function qPill(q) {
  if (q == null) return '<span class="pill pill-yellow">?</span>';
  var cls = q >= 65 ? 'pill-green' : q >= 35 ? 'pill-yellow' : 'pill-red';
  return '<span class="pill '+cls+'">Q:'+q+'</span>';
}
function statusPill(s) {
  var map = {
    approved: ['pill-green','✓ Approved'],
    skipped:  ['pill-red', '✕ Skipped'],
    pending_review: ['pill-yellow','Pending'],
    completed: ['pill-green','✓ Complete'],
    processing: ['pill-blue','Processing'],
    failed: ['pill-red','Failed']
  };
  var m = map[s] || ['pill-yellow', s||'—'];
  return '<span class="pill '+m[0]+'">'+m[1]+'</span>';
}
function typePill(t) {
  var map = { bec:'pill-green', followup:'pill-blue', admin:'pill-red', other:'pill-yellow' };
  var labels = { bec:'BEC', followup:'Follow-Up', admin:'Admin', other:'Other' };
  return '<span class="pill '+(map[t]||'pill-yellow')+'">'+(labels[t]||t||'—')+'</span>';
}

// ── Tab switching ────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.tab-pane').forEach(function(p){ p.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('pane-'+name).classList.add('active');
}

// ── Render helpers ───────────────────────────────────────────────────────────
function renderCalls(calls) {
  var el = document.getElementById('calls-list');
  document.getElementById('tab-calls-count').textContent = calls.length;
  if (!calls.length) { el.innerHTML = '<div class="empty">No calls found for this prospect.</div>'; return; }
  el.innerHTML = calls.map(function(c) {
    var s = c.summary || {};
    if (typeof s === 'string') { try { s = JSON.parse(s); } catch(e){ s={}; } }
    var att = c.attendees || [];
    if (typeof att === 'string') { try { att = JSON.parse(att); } catch(e){ att=[]; } }
    var attStr = att.map(function(a){ return a.email||a.name||''; }).filter(Boolean).join(', ');
    var dt = c.date ? new Date(c.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
    var summary = s.short_summary || s.overview || '(no summary)';
    return '<div class="card">'
      + '<div class="card-header">'
      + '<div><div class="card-title">'+esc(c.title||'(untitled)')+'</div>'
      + '<div class="card-sub">'+dt+(c.duration?' · '+Math.round(c.duration)+'m':'')+(attStr?' · '+esc(attStr):'')+'</div></div>'
      + '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">'
      + typePill(c.call_type)+qPill(c.q_score)+statusPill(c.status)
      + '</div></div>'
      + '<div class="card-body">'+esc(summary.slice(0,280))+(summary.length>280?'…':'')+'</div>'
      + (c.status==='approved'
        ? '<div style="margin-top:12px"><a class="action-link" href="/dashboard?newjob='+encodeURIComponent(c.attendees_email||'')+'">▶ Create Job</a></div>'
        : '')
      + '</div>';
  }).join('');
}

function renderJobs(jobs) {
  var el = document.getElementById('jobs-list');
  document.getElementById('tab-jobs-count').textContent = jobs.length;
  if (!jobs.length) { el.innerHTML = '<div class="empty">No Deal Forge jobs yet for this prospect.</div>'; return; }
  el.innerHTML = jobs.map(function(j) {
    var dt = j.created_at ? new Date(j.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
    var company = esc(j.prospect_company || j.prospect_email || '—');
    return '<div class="card">'
      + '<div class="card-header">'
      + '<div><div class="card-title">'+company+'</div>'
      + '<div class="card-sub">'+dt+(j.rep_name?' · Rep: '+esc(j.rep_name):'')+'</div></div>'
      + statusPill(j.status)
      + '</div>'
      + '<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">'
      + (j.status==='completed'
        ? '<a class="action-link" href="/portal/'+j.id+'" target="_blank">Open Portal ↗</a>'
        : '')
      + '</div>'
      + '</div>';
  }).join('');
}

function renderICP(data) {
  var el = document.getElementById('icp-card');
  // Try to find ICP from most recent completed job's extracted_data
  var icp = null;
  if (data.file && data.file.icp) icp = data.file.icp;
  else if (data.jobs && data.jobs.length) {
    for (var i=0; i<data.jobs.length; i++) {
      var ed = data.jobs[i].extracted_data;
      if (ed) {
        if (typeof ed === 'string') { try { ed = JSON.parse(ed); } catch(e){ ed=null; } }
        if (ed && ed.icp) { icp = ed.icp; break; }
      }
    }
  }
  if (!icp) {
    el.innerHTML = '<div class="empty">No ICP data yet. Create a job from an approved call to generate one.</div>';
    return;
  }
  var rows = [
    ['Titles', (icp.apollo_titles||[]).join(', ')],
    ['Industry', (icp.apollo_industries||[]).join(', ')],
    ['Geography', (icp.apollo_geography||[]).join(', ')],
    ['Company Size', (icp.apollo_employee_ranges||[]).join(', ')],
    ['Pain Point', icp.pain_point||'—'],
    ['Result', icp.promised_result||'—'],
    ['Goal', icp.client_goal||'—']
  ].filter(function(r){ return r[1] && r[1] !== '—'; });
  el.innerHTML = '<div class="icp-grid">'
    + rows.map(function(r){ return '<div class="icp-label">'+esc(r[0])+'</div><div class="icp-value">'+esc(r[1])+'</div>'; }).join('')
    + '</div>';
}

function renderHeader(data) {
  var name = '';
  var company = '';
  if (data.file) { name = data.file.name || ''; company = data.file.company || ''; }
  if (!name && data.jobs && data.jobs[0]) { name = data.jobs[0].prospect_name || ''; company = data.jobs[0].prospect_company || ''; }
  document.getElementById('p-name').textContent = name || company || data.email;
  document.getElementById('p-email').textContent = data.email;
  var meta = [];
  if (company && company !== name) meta.push('<span class="prospect-meta-item"><strong>'+esc(company)+'</strong></span>');
  meta.push('<span class="prospect-meta-item">'+data.calls.length+' call'+(data.calls.length!==1?'s':'')+'</span>');
  meta.push('<span class="prospect-meta-item">'+data.jobs.length+' job'+(data.jobs.length!==1?'s':'')+'</span>');
  var approved = data.calls.filter(function(c){ return c.status==='approved'; }).length;
  if (approved) meta.push('<span class="prospect-meta-item"><strong style="color:#4ade80">'+approved+' approved</strong></span>');
  document.getElementById('p-meta').innerHTML = meta.join('');
}

// ── Load data ────────────────────────────────────────────────────────────────
function loadProspect() {
  var email = new URLSearchParams(window.location.search).get('email') || '';
  if (!email) {
    document.getElementById('p-name').textContent = 'No email provided';
    return;
  }
  fetch('/api/prospect/' + encodeURIComponent(email))
    .then(function(r){ return r.json(); })
    .then(function(data) {
      PROSPECT_DATA = data;
      renderHeader(data);
      renderCalls(data.calls || []);
      renderJobs(data.jobs || []);
      renderICP(data);
    })
    .catch(function(e) {
      document.getElementById('p-name').textContent = 'Error loading data';
      console.error(e);
    });
}

// ── Notification panel ───────────────────────────────────────────────────────
var NOTIF_OPEN = false;
var NOTIF_DATA = [];

var NOTIF_ICONS = {
  new_bec:        '🟢',
  review_required:'⚠️',
  job_complete:   '✅',
  apollo_warning: '🔴',
  sync_complete:  '🔄'
};

function toggleNotifPanel() {
  NOTIF_OPEN = !NOTIF_OPEN;
  document.getElementById('notif-overlay').classList.toggle('open', NOTIF_OPEN);
  if (NOTIF_OPEN) loadNotifications();
}

function loadNotifications() {
  fetch('/api/notifications?limit=30')
    .then(function(r){ return r.json(); })
    .then(function(data){
      NOTIF_DATA = Array.isArray(data) ? data : [];
      renderNotifications();
      updateBellBadge(NOTIF_DATA.filter(function(n){ return !n.read; }).length);
    })
    .catch(function(){});
}

function renderNotifications() {
  var el = document.getElementById('notif-list');
  if (!NOTIF_DATA.length) { el.innerHTML = '<div class="notif-empty">No notifications yet</div>'; return; }
  el.innerHTML = NOTIF_DATA.map(function(n){
    var icon = NOTIF_ICONS[n.type] || '🔔';
    return '<div class="notif-item'+(n.read?'':' unread')+'" onclick="markRead(\''+n.id+'\')">'
      + '<div class="notif-item-title"><span class="notif-icon">'+icon+'</span>'+esc(n.title)+'</div>'
      + (n.body ? '<div class="notif-item-body">'+esc(n.body)+'</div>' : '')
      + '<div class="notif-item-time">'+relTime(n.created_at)+'</div>'
      + '</div>';
  }).join('');
}

function updateBellBadge(count) {
  var badge = document.getElementById('bell-badge');
  if (!badge) return;
  badge.textContent = count > 99 ? '99+' : count;
  badge.style.display = count > 0 ? 'flex' : 'none';
}

function markRead(id) {
  fetch('/api/notifications/'+id+'/read', { method:'PATCH' })
    .then(function(){ loadNotifications(); })
    .catch(function(){});
}

function markAllRead() {
  fetch('/api/notifications/read-all', { method:'PATCH' })
    .then(function(){ loadNotifications(); })
    .catch(function(){});
}

// Poll bell count every 30s
function pollBell() {
  fetch('/api/notifications?unread=1&limit=1')
    .then(function(r){ return r.json(); })
    .then(function(d){
      updateBellBadge(Array.isArray(d) ? d.length : 0);
    })
    .catch(function(){});
}

// ── Init ─────────────────────────────────────────────────────────────────────
loadProspect();
pollBell();
setInterval(pollBell, 30000);
</script>
</body>
</html>
